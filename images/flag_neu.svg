<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 40">
  <rect width="60" height="40" fill="#e8d5a0"/>
  <!-- Bordure intérieure -->
  <rect x="2" y="2" width="56" height="36" fill="none" stroke="#a08040" stroke-width="1.5"/>
  <!-- Croix centrale fine — symbole de neutralité -->
  <line x1="30" y1="8" x2="30" y2="32" stroke="#a08040" stroke-width="1" opacity="0.5"/>
  <line x1="8" y1="20" x2="52" y2="20" stroke="#a08040" stroke-width="1" opacity="0.5"/>
  <!-- Texte NEUTRE stylisé -->
  <text x="30" y="23" font-family="Georgia, serif" font-size="8" fill="#7a6030" text-anchor="middle" font-style="italic" opacity="0.8">Neutre</text>
  <!-- Petits ornements coins -->
  <circle cx="6" cy="6" r="1.5" fill="#a08040" opacity="0.6"/>
  <circle cx="54" cy="6" r="1.5" fill="#a08040" opacity="0.6"/>
  <circle cx="6" cy="34" r="1.5" fill="#a08040" opacity="0.6"/>
  <circle cx="54" cy="34" r="1.5" fill="#a08040" opacity="0.6"/>
</svg>
